<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investor Lens - Stock Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .stitch-card {
            background-color: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            transition: all 0.2s;
        }
        .stitch-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); transform: translateY(-2px); }
        .stitch-input { border: 1px solid #E2E8F0; border-radius: 9999px; transition: all 0.2s; }
        .stitch-input:focus { outline: none; border-color: #3B82F6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        
        #autocomplete-results {
            display: none; position: absolute; top: 100%; left: 0; right: 0;
            background: white; border: 1px solid #E2E8F0; border-radius: 1rem;
            margin-top: 8px; z-index: 50; overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="w-full max-w-5xl mx-auto px-6 py-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <svg class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            <span class="font-bold text-xl tracking-tight">Investor Lens</span>
        </div>
        <a href="/scanner" class="flex items-center gap-1.5 px-4 py-2 rounded-full border border-slate-200 hover:border-blue-300 hover:bg-blue-50 transition-colors text-sm font-medium text-slate-600 hover:text-blue-700">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            Top Picks
        </a>
    </nav>

    <main class="flex-grow w-full max-w-3xl mx-auto px-6 py-12 flex flex-col items-center">
        
        <div class="text-center mb-10 w-full">
            <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-slate-900 mb-4">See stocks through the eyes of legends.</h1>
            <p class="text-lg text-slate-500 mb-8 max-w-xl mx-auto">Instant analysis across 10 legendary investor frameworks including Buffett, Lynch, Graham and Burry.</p>
            
            <form action="/analyze" method="post" class="w-full relative max-w-lg mx-auto" id="search-form">
                <div class="relative flex items-center">
                    <svg class="h-5 w-5 absolute left-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <input type="text" name="ticker" id="ticker-input" placeholder="Search company or ticker (e.g. AAPL)" autocomplete="off"
                           class="w-full stitch-input py-4 pl-14 pr-32 text-slate-900 bg-white placeholder-slate-400 text-lg">
                    <button type="submit" class="absolute right-2 px-6 py-2 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-full transition-colors">
                        Analyse
                    </button>
                </div>
                
                <!-- Autocomplete Dropdown -->
                <div id="autocomplete-results">
                    <ul id="results-list" class="divide-y divide-slate-100"></ul>
                </div>
            </form>
        </div>

        <!-- News Feed -->
        <div class="w-full mt-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Market News</h3>
                <span id="news-status" class="text-xs text-slate-400"></span>
            </div>
            <div id="news-feed" class="space-y-2">
                <!-- Loading skeleton -->
                <div class="news-skeleton stitch-card p-4 animate-pulse flex gap-3">
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-200 rounded w-3/4"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/2"></div>
                    </div>
                </div>
                <div class="news-skeleton stitch-card p-4 animate-pulse flex gap-3">
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-200 rounded w-5/6"></div>
                        <div class="h-3 bg-slate-200 rounded w-2/5"></div>
                    </div>
                </div>
                <div class="news-skeleton stitch-card p-4 animate-pulse flex gap-3">
                    <div class="flex-1 space-y-2">
                        <div class="h-3 bg-slate-200 rounded w-2/3"></div>
                        <div class="h-3 bg-slate-200 rounded w-1/3"></div>
                    </div>
                </div>
            </div>
        </div>
        
    </main>

    <footer class="w-full py-6 text-center text-slate-400 text-sm">
        <p>Data provided by Yahoo Finance.</p>
    </footer>

    <script>
        const input = document.getElementById('ticker-input');
        const resultsContainer = document.getElementById('autocomplete-results');
        const resultsList = document.getElementById('results-list');
        let timeout = null;

        input.addEventListener('input', function() {
            clearTimeout(timeout);
            const query = this.value.trim();
            
            if (query.length < 2) {
                resultsContainer.style.display = 'none';
                return;
            }

            timeout = setTimeout(async () => {
                try {
                    const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                    const data = await response.json();
                    
                    resultsList.innerHTML = '';
                    if (data.results && data.results.length > 0) {
                        data.results.forEach(item => {
                            const li = document.createElement('li');
                            li.className = 'px-4 py-3 hover:bg-slate-50 cursor-pointer flex justify-between items-center text-left';
                            li.innerHTML = `
                                <div>
                                    <span class="font-bold text-slate-800">${item.symbol}</span>
                                    <span class="text-sm text-slate-500 ml-2 block sm:inline">${item.name}</span>
                                </div>
                                <span class="text-xs text-slate-400 uppercase bg-slate-100 px-2 py-1 rounded">${item.exchange}</span>
                            `;
                            li.addEventListener('click', () => {
                                input.value = item.symbol;
                                resultsContainer.style.display = 'none';
                                document.getElementById('search-form').submit();
                            });
                            resultsList.appendChild(li);
                        });
                        resultsContainer.style.display = 'block';
                    } else {
                        resultsContainer.style.display = 'none';
                    }
                } catch (e) {
                    console.error('Search error:', e);
                }
            }, 300); // debounce 300ms
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!document.getElementById('search-form').contains(e.target)) {
                resultsContainer.style.display = 'none';
            }
        });

        // ── News Feed ──────────────────────────────────────────────────────
        const NEWS_REFRESH_MS = 10 * 60 * 1000; // 10 minutes
        let newsRefreshTimer = null;
        let lastFetchedAt = null;

        async function loadNews() {
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                renderNews(data.items || [], data.age_secs || 0);
                lastFetchedAt = Date.now();
            } catch (e) {
                document.getElementById('news-status').textContent = 'Could not load news.';
            }
        }

        function renderNews(items, ageSecs) {
            const feed = document.getElementById('news-feed');
            const status = document.getElementById('news-status');

            if (!items.length) {
                feed.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">No news available.</p>';
                return;
            }

            feed.innerHTML = items.map(item => `
                <a href="${item.link}" target="_blank" rel="noopener noreferrer"
                   class="stitch-card p-4 flex items-start justify-between gap-4 group block hover:border-blue-200">
                    <p class="text-sm font-medium text-slate-800 group-hover:text-blue-600 leading-snug flex-1 transition-colors">
                        ${item.title}
                    </p>
                    <div class="flex-shrink-0 text-right">
                        <span class="text-xs text-slate-400 block">${item.source}</span>
                        <span class="text-xs text-slate-400 block">${item.age}</span>
                    </div>
                </a>
            `).join('');

            const mins = ageSecs > 0 ? Math.round(ageSecs / 60) : 0;
            status.textContent = mins > 0 ? `Updated ${mins}m ago` : 'Just updated';
        }

        function startNewsRefresh() {
            clearInterval(newsRefreshTimer);
            newsRefreshTimer = setInterval(loadNews, NEWS_REFRESH_MS);
        }

        // Load immediately, then refresh every 10 minutes
        loadNews();
        startNewsRefresh();
    </script>
</body>
</html>
